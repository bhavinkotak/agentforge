name: Agent Test (NVIDIA NIM)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nvidia-test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: ${{ vars.AGENTFORGE_DEBUG == 'true' && 'full' || '1' }}
  SQLX_OFFLINE: true

jobs:
  # ─── Run agent eval against free NVIDIA NIM models ──────────────────────────
  agent-test-nvidia:
    name: Agent Eval (NVIDIA NIM)
    runs-on: ubuntu-latest
    # continue-on-error so this job doesn't block the overall workflow when
    # NVIDIA_API_KEY is not configured (e.g. forks, contributor PRs).
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nvidia-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nvidia-test-

      - name: Build CLI
        run: cargo build --package agentforge-cli --release --locked

      - name: Run agent eval (NVIDIA NIM — free tier)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # Use a free NVIDIA NIM model for both agent and judge.
          # Override via AGENTFORGE_NVIDIA_MODEL env if needed.
          # Current free models with tool-calling support (build.nvidia.com/models):
          #   mistralai/mistral-small-4-119b-2603  — default (free, fast, strong tool calling)
          #   z-ai/glm-5.1                         — agentic AI, free
          #   deepseek-ai/deepseek-v3-0324         — explicit tool calling tag, free
          #   mistralai/mistral-large-3-675b-instruct-2512 — large, agentic, free
          AGENTFORGE_JUDGE_PROVIDER: nvidia
          # mistral-small-4 is free, has strong tool-calling support, and is fast.
          # Override via AGENTFORGE_NVIDIA_MODEL to try other free models.
          AGENTFORGE_NVIDIA_MODEL: mistralai/mistral-small-4-119b-2603
          # Set repo variable AGENTFORGE_DEBUG=true (Settings → Variables → Actions)
          # to enable verbose trace-level logging.
          RUST_LOG: ${{ vars.AGENTFORGE_DEBUG == 'true' && 'agentforge=debug,agentforge_runner=debug,agentforge_scenarios=debug,agentforge_scorer=debug' || 'warn' }}
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY secret not configured — skipping eval."
            echo "Add NVIDIA_API_KEY under Settings → Secrets → Actions to enable this job."
            exit 0
          fi
          VERBOSE_FLAG=""
          if [ "${{ vars.AGENTFORGE_DEBUG }}" = "true" ]; then
            VERBOSE_FLAG="-vv"
            echo "=== DEBUG MODE ENABLED (AGENTFORGE_DEBUG=true) ==="
            echo "AGENTFORGE_NVIDIA_MODEL: $AGENTFORGE_NVIDIA_MODEL"
            echo "AGENTFORGE_JUDGE_PROVIDER: $AGENTFORGE_JUDGE_PROVIDER"
          fi
          EVAL_EXIT=0
          ./target/release/agentforge run $VERBOSE_FLAG \
            --agent fixtures/customer-support-agent.yaml \
            --scenarios 5 \
            --concurrency 2 \
            --seed 42 || EVAL_EXIT=$?
          if [ "$EVAL_EXIT" -eq 0 ]; then
            echo "All scenarios passed the evaluation threshold."
          elif [ "$EVAL_EXIT" -eq 1 ]; then
            echo "NVIDIA NIM eval ran. Agent did not meet the pass threshold — expected when"
            echo "evaluating a GPT-4o fixture against a smaller free-tier model."
            echo "NVIDIA NIM connectivity and integration verified."
          else
            echo "Fatal error during eval (exit code: $EVAL_EXIT)"
            exit "$EVAL_EXIT"
          fi
